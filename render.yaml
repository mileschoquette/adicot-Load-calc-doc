# Render blueprint for the HVAC PDF Pipeline.
# Deploy by connecting this GitHub repo at https://dashboard.render.com/blueprints
#
# After deploy, set these env vars in the service dashboard:
#   APP_PASSWORD — the shared password engineers will use (username: adicot)
#   SECRET_KEY   — generate a random 32+ char string (Render can auto-generate)
services:
  - type: web
    name: hvac-pdf-pipeline
    runtime: python
    plan: starter                       # paid plan: always-on + supports the persistent disk below.
                                        # Do NOT set back to "free": free has no persistent disk, so
                                        # re-applying the blueprint would detach the disk and wipe jobs.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: APP_PASSWORD
        sync: false                     # set this manually in the dashboard
      - key: SECRET_KEY
        generateValue: true             # Render generates a random value
      - key: JOBS_DIR
        value: /var/data/jobs           # persistent disk mount
    disk:
      name: jobs-disk
      mountPath: /var/data
      sizeGB: 1                         # 1 GB is plenty for years of jobs
