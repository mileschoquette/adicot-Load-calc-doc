<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HVAC Loads PDF Pipeline{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="{{ url_for('index') }}">HVAC Loads PDF Pipeline</a></h1>
      <nav>
        <a href="{{ url_for('index') }}">New Job</a>
        <a href="{{ url_for('list_jobs') }}">Past Jobs</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        {% for category, msg in msgs %}
          <div class="flash flash-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      <small>Adicot, Inc. | Professional Engineering Services</small>
    </div>
  </footer>
</body>
</html>
